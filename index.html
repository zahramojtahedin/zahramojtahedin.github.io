  <style>
    :root {
      --navy: #17324d;
      --blue: #2f6690;
      --teal: #2a8c82;
      --gold: #c9933b;
      --ink: #2d3742;
      --muted: #697887;
      --line: #d9e1e7;
      --soft-blue: #eef5f9;
      --soft-teal: #edf8f6;
      --soft-gold: #fbf5e9;
      --paper: #ffffff;
      --page: #f7f9fb;
      --shadow: 0 8px 26px rgba(23, 50, 77, 0.08);
      --radius: 10px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--page);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      line-height: 1.7;
    }

    a {
      color: var(--blue);
      text-decoration: none;
    }

    a:hover {
      color: var(--teal);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.97);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .topbar-inner {
      width: min(1180px, 94%);
      min-height: 68px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
    }

    .site-name {
      color: var(--navy);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.3rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .menu {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 23px;
      flex-wrap: wrap;
    }

    .menu a {
      color: #3f4b56;
      font-size: 0.93rem;
      font-weight: 600;
      padding: 23px 0 19px;
      border-bottom: 3px solid transparent;
    }

    .menu a.active,
    .menu a:hover {
      color: var(--navy);
      border-bottom-color: var(--teal);
    }

    .layout {
      width: min(1180px, 94%);
      margin: 0 auto;
      padding: 52px 0 72px;
      display: grid;
      grid-template-columns: 285px minmax(0, 1fr);
      gap: 46px;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 102px;
    }

    .profile-photo-wrap {
      position: relative;
      display: block;
      width: 175px;
      height: 175px;
      margin-bottom: 24px;
      border-radius: 50%;
      background:
        linear-gradient(145deg, rgba(47, 102, 144, 0.16), rgba(42, 140, 130, 0.18));
      border: 5px solid white;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .profile-photo {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .profile-placeholder {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--blue);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-align: center;
      padding: 20px;
    }

    .profile-placeholder svg {
      width: 66px;
      height: 66px;
      fill: rgba(47, 102, 144, 0.62);
    }

    .sidebar h1 {
      margin: 0 0 8px;
      color: var(--navy);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.7rem;
      line-height: 1.25;
    }

    .sidebar-role {
      margin: 0 0 14px;
      color: var(--teal);
      font-size: 0.98rem;
      font-weight: 700;
    }

    .sidebar-bio {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 0.93rem;
    }

    .sidebar-meta,
    .social-links {
      display: grid;
